    "chapterContent": "# 第三章 雾中往事\n\n三天后，@{林舟}的左肩终于能正常活动了。\n\n他窝在旧仓库的出租屋里，桌上摆着那本账本，旁边是一叠从公共图书馆复印的旧报纸，还有几张手绘的地图。伤口愈合的过程漫长而瘙痒，他每天用冰敷来缓解肿胀，夜里睡不着觉，就翻来覆去地研究那本账本。\n\n十五年的记录。\n\n十五年的罪证。\n\n每一页都像一块拼图，慢慢在他眼前拼凑出一幅令人不寒而栗的画面。走私、军火、器官交易、情报买卖……每一笔账目都指向同一个方向——赵继明，以及他背后那个讳莫如深的组织。\n\n但@{沈昭}说得对。这只是冰山一角。\n\n赵继明在账本里的签名笔迹并不统一，有些是标准公文格式，有些是潦草的私人签名，还有些干脆只有首字母缩写。这说明什么？说明这些账目不是赵继明一个人记的，他只是最终汇总的那个人。\n\n这个网络的规模，远比@{林舟}想象的要大。\n\n他翻到账本中间部分，这里夹着一张三年前的老照片。\n\n照片上是两个人。一个是赵继明，年轻一些，头发还没全白，站在一个码头边上，身后是几艘渔船。另一个人的脸被折痕挡住了，@{林舟}小心翼翼地把折痕抚平，看清了那人的长相——\n\n他的心脏猛地收紧。\n\n照片背面有一行字，字迹已经褪色，但依稀能辨认出来：雾港联络办成立纪念，左二赵继明，右二沈。\n\n沈。\n\n@{沈昭}姓沈。\n\n@{林舟}的呼吸变得急促起来。他想起@{沈昭}在面包车里说的话——\"老陈是我舅舅\"。老陈姓陈，@{沈昭}姓沈，这不是同姓。但老陈和@{沈昭}是舅甥关系，说明@{沈昭}的妈妈姓陈。\n\n老陈的妹妹姓陈，嫁给了姓沈的人，生下了@{沈昭}。\n\n这张照片里有赵继明，有姓沈的人。十五年前，雾港联络办——这不是什么政府机构，这是一个地下网络的代号。\n\n而@{沈昭}，是这个网络里的人。\n\n@{林舟}盯着照片里那张模糊的脸，一种说不清的情绪在心底翻涌。是愤怒？是背叛感？还是某种更复杂的东西？\n\n他想起@{沈昭}在面包车里举枪指着他时说的话：\"老陈让我保护你。\"也想起他最后那句警告：\"别再查了。\"\n\n一个矛盾的人。一个混乱的身份。他到底是敌人还是朋友？\n\n就在这时，桌上的手机响了。\n\n来电显示：@{苏晴}。\n\n@{林舟}盯着那个名字看了三秒钟。苏晴。法医。雾港市公安局法医鉴定中心的主治医师。他和她只在三年前有过一面之缘——那时候他还在刑侦支队，她刚调来雾港不久，在一次案件分析会上见过几面。\n\n她怎么有他的号码？\n\n他接起电话。\n\n\"@{林舟}？\"电话那头的声音低沉而克制，是典型的法医腔调——冷静、精准、不带感情色彩，\"我是@{苏晴}，市公安局法医中心。\"\n\n\"我知道。\"@{林舟}的声音也很平静，\"@{苏晴}法医，久仰。\"\n\n\"我有件事要告诉你，\"她说，\"关于码头那具尸体——就是你发现的那具。你知道他的身份了吗？\"\n\n\"你是说老陈？\"@{林舟}的手指无意识地攥紧了电话，\"我已经知道了。\"\n\n电话那头沉默了两秒钟。\n\n\"你不知道，\"@{苏晴}说，\"他的验尸报告出来了。有些事情……我建议你先看看这个。\"\n\n\"什么事？\"\n\n\"他在死之前三天，曾经做过一次全身体检。\"@{苏晴}的声音压得更低，\"体检报告显示，他的血液里有一种特殊的毒素——是我们局里实验室特有的药物。\"\n\n@{林舟}的瞳孔猛地收缩。\n\n\"你是说——\"\n\n\"我是说，他是在看守所里被下的毒。\"@{苏晴}停顿了一下，\"他不是死于灭口，是死于灭口之前的灭口——有人怕他在看守所里说出什么。\"\n\n看守所。\n\n老陈在被\"海难\"之前的三天，曾经被关进过雾港市公安局的看守所。那是@{林舟}被审查同期发生的事——当时老陈作为嫌疑人被拘押，但仅仅关了两天就因为\"证据不足\"释放了。释放的第二天，他就\"出海遇难\"了。\n\n\"他的死亡报告是谁签字的？\"@{林舟}问。\n\n\"我签的。\"@{苏晴}说，\"但那是在我调来雾港之前。原法医签的。\"\n\n\"那个法医现在在哪？\"\n\n\"死了。半年前，\"@{苏晴}的声音里有一丝难以察觉的波动，\"车祸。\"\n\n又是死亡。\n\n@{林舟}攥紧电话，指节发白。每一个接近真相的人，都在以各种方式死去。老陈、原法医、现在的老陈……这个名单有多长？\n\n\"你为什么要告诉我这些？\"他问。\n\n电话那头沉默了很久。\n\n\"因为三年前我刚来雾港的时候，审查你的那个人——\"@{苏晴}的声音突然变得很轻，轻到几乎听不清，\"是赵局长亲自批的。\"\n\n这句话像一盆冰水浇在@{林舟}头上。\n\n\"我当时不知道这意味着什么，\"她继续说，\"后来我才知道，赵局长亲自经手的案子，没有一个是干净的。\"\n\n\"你是说——\"\n\n\"我是说，\"@{苏晴}打断他，\"三年前审查你的时候，有人在你的血液样本里加了东西。所以你才没有通过那一轮审查。\"\n\n@{林舟}愣住了。\n\n三年前他被审查的时候，有一项血液检测显示他\"涉嫌吸毒\"，这个检测结果直接导致了他的革职。但他是被诬陷的，他从来没有碰过任何毒品。\n\n原来如此。\n\n原来是这样。\n\n\"那个人是谁？\"他的声音发颤，\"是谁在我的血液里动了手脚？\"\n\n\"我不知道，\"@{苏晴}说，\"但我知道的那个人，已经死了。\"\n\n\"谁？\"\n\n\"原法医。\"\n\n又是一条断掉的线索。\n\n\"@{苏晴}，\"@{林舟}突然问，\"你为什么要告诉我这些？\"\n\n电话那头沉默了很久。\n\n\"因为三年前，\"她终于开口，声音里有一种难以名状的情绪，\"我没能救下一个人。这一次，我不想再沉默。\"\n\n电话挂断了。\n\n@{林舟}放下电话，盯着桌上那本账本。\n\n三天前他拿到账本的时候，以为拿到了打开真相之门的钥匙。现在他发现，门后面还有门，而每一个门的背后，都是更多的死亡和阴谋。\n\n他想起@{沈昭}在面包车里说的那句话：\"@{苏晴}不是你想的那样简单。\"\n\n现在他明白了。那不是威胁，那是警告。\n\n苏晴法医，这个看似中立客观的局外人，这个三年前没能阻止他被诬陷的沉默证人——她知道的，比她表现出来的要多得多。\n\n而那个杀了老陈、被@{沈昭}称为\"组织的人\"的杀手——他们还会再来吗？\n\n他看了眼窗外。太阳正在落山，雾港的黄昏和早晨一样，弥漫着潮湿而暧昧的气息。\n\n第三次阅读账本的时候，@{林舟}在账本最后一页的背面，发现了一行极淡的铅笔字迹。\n\n那笔迹很轻，像是用手指甲刻上去的，几乎要贴着纸面才能看清：\n\n\"联络办地下三层，密室。\"\n\n他盯着这行字看了很久。\n\n雾港联络办——就是那张老照片里提到的地方。十五年前赵继明和某个姓沈的人合影的地方。\n\n那里会有什么东西？账本的真本？还是更黑暗的秘密？\n\n他站起身，把账本塞进内袋，抓起挂在门后的钥匙。\n\n十五年的秘密，三年的等待，今晚或许就能揭开最后一层迷雾。\n\n但他没有注意到的是，窗外街角的阴影里，有一个人影正在用手机低声通话。\n\n\"目标准备行动了。\"那个人说，\"通知@{赵局长}。\"\n",
