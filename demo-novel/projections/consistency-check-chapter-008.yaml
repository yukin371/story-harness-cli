    "chapterContent": "# 第八章 雾散\n\n三天后，@{林舟}站在雾港市公安局的大门前。\n\n晨雾还没散，湿漉漉的空气贴在皮肤上，带着一股熟悉的海腥味。他穿着那件旧风衣，但里面是刚从干洗店拿回来的干净衬衫——三天没换衣服了，身上终于没了那股汗味和血腥味。\n\n他手里提着一个文件袋，里面装着三样东西：从芒镇岛拿到的数据备份、@{苏明} 帮他弄到的 @{赵继业} 疗养院探视记录、以及一张他三天前匿名寄给省纪委的快递单据。\n\n是的，他寄了。\n\n在去疗养院见到 @{赵继业} 之后，他把两份证据——硬盘里的数据，和 @{赵继业} 藏了五年的备份——一起打包，寄给了省纪委。快递是三天前寄的，根据他的计算，省纪委应该已经收到并开始调查了。\n\n但 @{赵局长} 不知道这些。\n\n他今天来，是要把 @{赵局长} 亲手拉下马。\n\n三天前，他从 @{苏明} 那里得知了 @{苏晴} 被软禁的位置——法医中心宿舍，三楼，最东边的房间。从芒镇岛回来之后，他一直在等一个机会，等 @{赵局长} 分心的机会。\n\n现在，机会来了。\n\n省纪委的调查组应该已经进驻雾港，@{赵局长} 一定在忙着销毁证据和清理关系网络。这是他最忙乱的时候，也是防备最薄弱的时候。\n\n他走进公安局大门。\n\n\"站住，\"门口的保安拦住他，\"你找谁？\"\n\n\"我找 @{赵局长}，\"@{林舟}的声音很平静，\"告诉他，有人要自首。\"\n\n十五分钟后，@{林舟}坐在了一间审讯室里。\n\n这间审讯室他太熟悉了——三年前，他就是在这间屋子里被审问了整整三天三夜。现在他又坐在这里，但身份完全不同了。\n\n门开了，@{赵局长}走了进来。\n\n他穿着一身便装，头发比三天前更白了一些，眼窝深陷，显然这几天没有睡好。但他的眼神依然锐利，看到 @{林舟} 的时候，嘴角甚至露出了一丝微笑。\n\n\"@{林舟}，\"他在对面坐下，\"好久不见。\"\n\n\"@{赵局长}，\"@{林舟}的声音很平静，\"您的气色不太好。\"\n\n\"老了，不中用了，\"@{赵局长}摆摆手，\"倒是你，这几天跑了不少地方吧？芒镇岛、疗养院、还有——你前妻的旧居？\"\n\n@{林舟}的心脏猛地收紧，但他的表情没有变化。\n\n\"您都知道。\"\n\n\"我当然知道，\"@{赵局长}的笑容变得阴冷，\"你以为你做的那些事我不知道？芒镇岛的数据，疗养院的探视，还有——你寄给省纪委的那个快递？\"\n\n他拍了拍手。\n\n\"@{林舟}，你太天真了。我在雾港经营了三十年，你以为你没有走不出这个门？\"\n\n\"您今天来见我，就是为了说这些？\"\n\n\"我今天来见你，是为了给你一个机会，\"@{赵局长}说，\"把数据交出来，把你知道的全部告诉我，然后你就可以离开雾港，去任何你想去的地方。\"\n\n\"然后呢？\"\n\n\"然后？\"@{赵局长}笑了，\"然后 @{苏晴} 可以回法医中心继续工作，@{沈昭} 可以消失，@{赵继业} 可以继续在疗养院'养病'。大家相安无事，不好吗？\"\n\n\" @{苏晴} 还能回去工作？\"\n\n\" @{苏晴} 是个能干的人，\"@{赵局长}说，\"只要她不再做傻事，她的位置不会变。\"\n\n@{林舟}盯着 @{赵局长}，看了很久很久。\n\n然后他笑了。\n\n\" @{赵局长}，\"他说，\"您知道今天早上我进门的时候，看到了什么吗？\"\n\n\"什么？\"\n\n\"省纪委的调查组，\"@{林舟}说，\"他们今天早上到了雾港，正在楼下和你们局里的人开会。\"\n\n@{赵局长}的脸色终于变了。\n\n\"你说什么？\"\n\n\"我说，\"@{林舟}的声音变得很轻很轻，\"您的时代，结束了。\"\n\n就在这时，审讯室的门被推开了。\n\n一个穿西装的中年男人站在门口，身后跟着两个穿制服的警察。\n\n\" @{赵继明} 同志，\"那个男人说，\"省纪委第三调查组。请您配合我们的调查。\"\n\n@{赵局长}的脸像纸一样白。\n\n他看着 @{林舟}，看了很久，像是不敢相信眼前发生的一切。\n\n\"@{林舟}，\"他的声音像是从牙缝里挤出来的，\"你以为你赢了？\"\n\n\"不是我赢了，\"@{林舟}站起身，走向门口，\"是三十七个死人赢了。是老陈赢了。是 @{苏晴} 和 @{沈昭} 赢了。\"\n\n他在门口停下，回头看了一眼。\n\n\" @{赵局长}，有一个人让我转告您一句话。\"\n\n\"谁？\"\n\n\" @{苏晴} 的妈妈，苏素云，\"@{林舟}说，\"她当年没能说出口的话，现在@{苏晴}替她说——十五年了，你们欠她的，该还了。\"\n\n他走出审讯室，身后是 @{赵局长} 歇斯底里的咆哮声和警察的制止声。\n\n走廊里阳光明媚，从窗户透进来的光线温暖而明亮。\n\n@{林舟}走到窗边，看着楼下来来往往的人群。\n\n三天后，@{赵局长}被正式逮捕的消息传遍了整个雾港。同一天，@{苏晴}被解除软禁，回到法医中心工作。@{沈昭}消失了，没有人知道他去了哪里。\n\n一个月后，省纪委的调查报告公布于众。@{赵局长}涉嫌受贿、滥用职权、故意杀人等多项罪名，被判处死刑，缓期两年执行。雾港市公安系统有十七名干部被牵连，其中八人被判刑，九人被处分。\n\n但案件没有结束。\n\n调查报告的最后，有一行小字：\"本案牵涉的更大网络，目前仍在进一步调查中。\"\n\n更大的网络。\n\n@{林舟}知道，这意味着 @{赵局长} 背后还有更大的人物。那个代号\"棋手\"的人，那个在架构图顶端的神秘存在——他们还在暗处，还在等待。\n\n三个月后的一个晚上，@{林舟}的手机突然收到一条陌生号码发来的短信。\n\n\"@{林舟}，你以为账本只有 @{赵局长} 这一本？\"\n\n他盯着那条短信，心脏像是被什么东西攥紧了。\n\n发送号码是一串数字，没有归属地显示。\n\n@{林舟}的手指悬在回复键上，犹豫了很久。\n\n他想起 @{沈昭} 曾经说过的话：\"你以为赵局长是最大的鱼，但你不知道，他只是某个更大网络里的一个节点。\"\n\n他想起 @{赵局长} 在审讯室里说的那句话：\"你以为你没有走不出这个门？\"\n\n他想起老陈用命换来的那本账本，和账本最后一页的那行字：\"联络办地下三层，密室。\"\n\n他终于按下回复键，输入了三个字：\n\n\"你是谁？\"\n\n几秒钟后，对方回复了。\n\n\"下次再说。\"\n\n然后号码变成了空号。\n\n@{林舟}站在窗边，看着雾港的夜景。\n\n这座城市永远不会完全干净。总有更多的秘密，更多的账本，更多像 @{赵局长} 这样的人，在暗处等待。\n\n但至少现在，迷雾散了一些。\n\n他想起 @{沈昭} 在面包车里说过的话：\"林队，有些事情不是你表面看到的那样。\"\n\n现在他终于明白，那句话的真正含义——\n\n这个世界上，没有什么是表面看起来那样的简单。每个人都有自己的秘密，自己的动机，自己的战场。\n\n而他，@{林舟}，只是刚好站在了这场战争的中心。\n\n手机又响了。\n\n是一条新短信，号码还是那个空号，但这次多了一行字：\n\n\"@{苏晴} 的生日是12月3日。@{沈昭} 喜欢吃酸的东西。老陈的渔船叫'浙岭号'。这些信息，也许以后用得上。\"\n\n短信的末尾，是一个坐标。\n\n雾港东南方向，三百海里。\n\n那里是公海。\n\n@{林舟}盯着那个坐标，沉默了很久。\n\n然后他笑了。\n\n他拿出手机，翻到 @{沈昭} 的号码——那是他被救出芒镇岛之后存下的，一直没有删除。\n\n他输入了一条消息：\n\n\"@{沈昭}，有空吗？我想喝一杯。\"\n\n发送。\n\n几分钟后，回复来了。\n\n\"酸的那种？\"\n\n\"不，\"@{林舟}打字回复，\"老陈喜欢的那种。\"\n\n这一次，@{沈昭}的回复很快：\n\n\"明天早上六点，渔轮码头。不见不散。\"\n\n@{林舟}放下手机，走到窗边。\n\n窗外的雾港，夜色正在慢慢消散，东边的天际已经泛起了一层淡淡的金色。\n\n新的一天要开始了。\n\n而新的战争，也在等待着他。\n",
