      "evidence": "@{周祈安}把推床往灯下再拽近一点，越看越觉得这具尸不像是从河里“捞”上来的，更像是被谁提前处理好再丢进去的。她指甲缝里没有正常溺亡常带的淤泥砂粒，反倒塞着细碎香灰；红绳也不是浸水后临时缠上的，而是按旧殡规打了死结，勒痕一直吃进踝骨。最刺眼的还是她嘴角那点淡得几乎看不见的蜡渍，像有人在她被送来之前，刚拿供灯油给她封过口。父亲失踪后，他一直逼自己别往旧规矩那头想，可只要这些细节一件件摆在眼前，那条早被他硬压下去的怀疑线还是自己浮了出来: 这女尸不是遇上了邪门，她本身就是某种被特地送进门的消息。",
