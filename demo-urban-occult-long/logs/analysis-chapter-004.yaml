      "evidence": "@{周祈安}站在雨里，手心那道被残印烫出的红痕忽然又热了一下。他抬眼去看水洼里的轿影，发现轿顶边沿正有一圈极浅的朱纹在雨里时隐时现，和昨晚那片旧城隍印残件边缘的纹路像出自同一副模子。因此@{周祈安}立刻怀疑这不是普通撞邪，而是有人明目张胆地把新案子接在旧案子后头，像故意告诉他: 你昨晚抢回来的东西，只不过是整笔旧债里最小的一块。",
