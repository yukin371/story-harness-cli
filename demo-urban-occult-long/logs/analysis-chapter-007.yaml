      "evidence": "封街命令来得很快，却不是普通治安口的节奏。外围交警只接到“旧路禁行”的指令，没人知道为什么要封；内圈几个夜巡协查点却已经提前把最容易撞上纸马的岔路清了出来，像有人不想让普通人出事，却也不准备真正阻止车队通过。@{周祈安}越看越不舒服，因为这种封法不像临时救火，更像顺着对方已经画好的路线给车队让路。若不是昨夜井口才截下那页“借债司”残契，他几乎会怀疑封街的人里是不是也有人知道这条押解线会从今晚开始重跑。",
