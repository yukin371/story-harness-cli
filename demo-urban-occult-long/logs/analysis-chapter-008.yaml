      "evidence": "离开戏楼前，周祈安最后回头看了一眼那块还在冒烟的断锣。台上唱词停了，台下人群散了，可后台这门把人命折成账的生意根本没有停，它只是把最要命的东西先送去了别处。顾算盘今晚只肯隔帘说话，说明他自己也只是手，不是头。可如果他都已经能逼夜巡在“保住台下活人”和“追住后台总账”之间做取舍，那真正站在他后头、敢让整座城市陪着一起演戏、还敢把夜巡执牌人的名字都预留进账里的人，又会是谁？而他们连夜赶去旧批发市场时，等在那道寿材仓门后的，会只是更多账本，还是卷一真正开始见血的那只手？",
