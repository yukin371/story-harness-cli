      "evidence": "“顾算盘？”@{沈观澜}从另一头掀帘进来，伞尖上还带着场外截下的纸灰。她这一声并不高，却让后台所有锣鼓点一起停了半拍。帘后的人笑了笑，没有承认，也没有否认，只说杜魁欠的那笔账已经清得差不多了，接下来该轮到夜巡人自己选站在哪一边。她进来时顺手把一只纸马眼珠扔到长案上，珠子一滚，正好停在那几张转库单边上，像把纸马押解线和戏班后台线明晃晃地并到了一起。因为这意味着@{顾算盘}并不只是灰线代理，而是真能碰到账本核心的人，所以周祈安反而比刚才更冷静了些。可他也清楚，对方既然肯在这时候隔帘说话，就说明戏台真正的失控点已经逼到眼前。",
