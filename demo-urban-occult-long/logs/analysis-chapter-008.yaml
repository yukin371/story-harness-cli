      "evidence": "更怪的是，台下并不是只这一个人不对。前排几个买高价坐票的看客脸色都白得反常，偏偏眼睛还舍不得离开台上，像不是真在看戏，而是在被什么东西硬按着听完。戏台上鼓点一紧，他们胸口那口气就跟着一起发颤。周祈安站在人群里，忽然想起殡仪馆夜班时偶尔会遇见的将死之人，气息也是这种一阵阵往外漏、却还没真正断掉的样子。区别只在于，那些人是生理快到头了，而眼前这些人分明是被锣鼓和唱词硬从活气里往外抽。",
