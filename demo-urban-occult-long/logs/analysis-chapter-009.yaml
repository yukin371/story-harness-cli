      "evidence": "@{周祈安}一眼就认出这地方不只是仓库，因为门口出入用的不是普通卸货板车，而是殡仪馆旧线才会用的转运滑轮架，连地上车辙都比市场别处深一寸。这里平时运的不是一般香烛，而是更重、更不能见光的东西。他心里本能一紧，紧张里还掺着一点越来越压不住的怀疑: 第三单元案真正的收口点，大概率就在这道卷帘门后面，而能把这种据点在城里藏这么久的人，绝不会只靠几个灰线跑腿。",
