      "evidence": "@{周祈安}伸手从“押解”箱里抽出一张旧票条，票边角落压着一枚残印拓痕，和第一案女尸吐出来那片纸角几乎同模。他胸口一沉，愤怒里还带着一点后知后觉的震惊，这才真正确定旧城隍印从来就不是一次丢失、一处藏匿，而是被人拆成若干能挂到不同行当里的零件，再靠棺材铺、婚契、戏班、纸马这几条灰线慢慢并网。换句话说，他们前面查的不是三个分开的异案，而是一条完整收债流水线上的三个岗位。前三案每一场拼命顶下来的危险，到这里都变成了别人账本上可以拆件、可以转卖、可以并库的货。",
