      "evidence": "她脸色没变，语气却比平时更冷：“讨香火债的人最怕账跑了，所以先记脚，后记命。进去以后别乱碰，看到编号先记，不急着抢。”@{周祈安}点了点头，把压箱簿塞进外套里侧，先按殡仪馆夜班交接的习惯看出入口、看卸货线、看二次转运痕迹。他现在越来越发现，自己在这条线上最值钱的不是胆子，而是夜班留下的流程感。别人看到这种仓只会想到邪门，他先看到的是谁负责入库、谁负责拆包、谁负责把脏东西转成能流通的货。也正因为看懂了流程，他心里的恐惧反而更重了些: 这不是一处临时躲藏点，而是一套已经跑顺了很久的生意。",
