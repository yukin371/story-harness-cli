      "evidence": "@{周祈安}却在这一刻忽然笑了一下，笑意很冷，像终于把对面最想藏的东西等到了：“你错了。我现在最担得起的，就是把这份假归档当场拆给你看。”他抬手一把抽出那张写着自己名字的补位页，当着印室和耳机另一头所有人的面，将它和半部巡夜录并排拍下，“你们能伪造东门验签，能伪造到库时间，能伪造今晚的回撤令，甚至能用我爸的旧字样给我做担保，可你们伪造不了一件事: 当年删名断签的人，不是为了逃值守，是为了不让你们把整条夜巡线一起拖下去。你们今晚开的不是旧规矩，是一条靠危险、背叛和失控吃饭的账线。”",
