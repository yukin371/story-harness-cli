              "startParagraph": 1,
              "endParagraph": 4,
              "createdAt": "2026-04-23T19:05:00+08:00",
              "updatedAt": "2026-04-23T19:05:00+08:00"
            },
            {
              "id": "scene-c003-02",
              "title": "赤纹登阶",
              "summary": "宁灼带着离火种稳住大阵，拿到进天门副试的资格，完成短篇阶段性跃迁。",
              "startParagraph": 5,
              "endParagraph": 8,
              "createdAt": "2026-04-23T19:05:00+08:00",
              "updatedAt": "2026-04-23T19:05:00+08:00"
            }
          ]
        }
      ]
    }
